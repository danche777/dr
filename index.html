<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поздравление с Днем рождения</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://player.vimeo.com/api/player.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>С Днем рождения!</h1>
            <p class="subtitle">Коллекция видео-поздравлений</p>
        </div>
    </header>

    <main>
        <div class="container">
            <section class="video-gallery">
                <div class="gallery-header">
                    <h2>Видео-поздравления</h2>
                    <span class="video-count" id="videoCount">5 видео</span>
                </div>
                
                <div class="videos-grid">
                    <div class="video-card">
                        <div class="video-wrapper">
                            <iframe 
                                src="https://player.vimeo.com/video/1186207117?badge=0&autopause=0&player_id=0&app_id=58479" 
                                frameborder="0" 
                                allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                                referrerpolicy="strict-origin-when-cross-origin" 
                                title="video1">
                            </iframe>
                        </div>
                        <div class="video-info">
                            <p class="video-title">Поздравление 1</p>
                        </div>
                    </div>

                    <div class="video-card">
                        <div class="video-wrapper">
                            <iframe 
                                src="https://player.vimeo.com/video/1186208338?badge=0&autopause=0&player_id=0&app_id=58479" 
                                frameborder="0" 
                                allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                                referrerpolicy="strict-origin-when-cross-origin" 
                                title="video2">
                            </iframe>
                        </div>
                        <div class="video-info">
                            <p class="video-title">Поздравление 2</p>
                        </div>
                    </div>

                    <div class="video-card">
                        <div class="video-wrapper">
                            <iframe 
                                src="https://player.vimeo.com/video/1186208305?badge=0&autopause=0&player_id=0&app_id=58479" 
                                frameborder="0" 
                                allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                                referrerpolicy="strict-origin-when-cross-origin" 
                                title="video3">
                            </iframe>
                        </div>
                        <div class="video-info">
                            <p class="video-title">Поздравление 3</p>
                        </div>
                    </div>

                    <div class="video-card">
                        <div class="video-wrapper">
                            <iframe 
                                src="https://player.vimeo.com/video/1186208274?badge=0&autopause=0&player_id=0&app_id=58479" 
                                frameborder="0" 
                                allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                                referrerpolicy="strict-origin-when-cross-origin" 
                                title="video4">
                            </iframe>
                        </div>
                        <div class="video-info">
                            <p class="video-title">Поздравление 4</p>
                        </div>
                    </div>

                    <div class="video-card">
                        <div class="video-wrapper">
                            <iframe 
                                src="https://player.vimeo.com/video/1186208249?badge=0&autopause=0&player_id=0&app_id=58479" 
                                frameborder="0" 
                                allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                                referrerpolicy="strict-origin-when-cross-origin" 
                                title="video5">
                            </iframe>
                        </div>
                        <div class="video-info">
                            <p class="video-title">Поздравление 5</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Кнопка для игры -->
            <div class="game-button-container">
                <button class="game-button" id="openGameBtn">
                    <span>🎮</span> Сыграй в змейку!
                </button>
            </div>
        </div>
    </main>

    <!-- Модальное окно игры -->
    <div class="modal" id="gameModal">
        <div class="modal-content">
            <button class="modal-close" id="closeGameBtn">&times;</button>
            <h2 class="modal-title">🐍 Змейка</h2>
            <div class="game-container">
                <canvas id="gameCanvas" width="300" height="300"></canvas>
                <div class="game-info">
                    <p>Счет: <span id="score">0</span></p>
                    <p class="game-controls">Используй стрелки, WASD или свайпы</p>
                    <button class="game-restart-btn" id="restartBtn">Заново</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 - С днем рождения! ❤️</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
